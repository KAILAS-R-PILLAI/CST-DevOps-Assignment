version: '3'  # Compose file format version. Version 3 is widely used for Docker Compose.

services:

  frontend:
    container_name: frontend  # Name of the frontend container.
    build:
      context: frontend/      # Path to the frontend Dockerfile.
      network: host           
    image: frontend-image     # Name of the Docker image to build for frontend.
    depends_on:
      - backend               # Ensures backend container starts before frontend.
    ports:
      - "3400:80"             # Maps host port 3400 to container port 80 (where frontend runs).
    networks:
      - three-tier-net        # Connects frontend to custom bridge network beacuse these containers run on the same host.

  backend:
    container_name: backend   # Name of the backend container.
    build:
      context: backend/       # Path to the backend Dockerfile.
      network: host         
    image: backend-image      # Name of the Docker image to build for backend.
    environment:              # Environment variables used by backend to connect to MySQL.
      - MYSQL_HOST=db         # Hostname of the MySQL container.
      - MYSQL_USER=root       # MySQL username.
      - MYSQL_PASSWORD=mysql123  # MySQL password.
      - MYSQL_DATABASE=school    # MySQL database name.
    ports:
      - "3500:3500"           # Maps host port 3500 to container port 3500 (backend API port).
    depends_on:
      - db                    # Ensures MySQL container starts before backend.
    networks:
      - three-tier-net        # Connects backend to custom bridge network beacuse these containers run on the same host.

  db:
    container_name: mysql-container  # Name of the MySQL container.
    image: mysql:latest               # MySQL official image from Docker Hub.
    environment:
      - MYSQL_ROOT_PASSWORD=mysql123  # Root password for MySQL.
      - MYSQL_DATABASE=school         # Database to create automatically on container start.
    volumes:
      - mysql-data:/var/lib/mysql     # Mounts named volume to persist MySQL data outside container.
      - ./db-init/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - three-tier-net                # Connects MySQL to the custom bridge network.

volumes:
  mysql-data:  # Named Docker volume to persist MySQL data. Survives container rebuilds.

networks:
  three-tier-net:
    driver: bridge  # Custom bridge network for all three services to communicate internally.
